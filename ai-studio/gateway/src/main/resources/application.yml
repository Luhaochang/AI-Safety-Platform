server:
  port: 8080

spring:
  main:
    allow-bean-definition-overriding: true
  redis:
    host: ${redis.host:10.33.38.21}
    port: ${redis.port:6379}
    password: ${redis.password:xiexie402}
    database: ${redis.database:2}
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
          lowerCaseServiceId: true
      routes:
        # ai-studio-auth
        - id: ai-studio-auth
          uri: lb://ai-studio-auth
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1
        # ai-studio-auth
        - id: ai-studio-production-line
          uri: lb://ai-studio-production-line
          predicates:
            - Path=/production-line/**
          filters:
            - StripPrefix=1
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource  # 数据源
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${datasource.auth.url:jdbc:mysql://10.33.38.21:3306/ai_studio?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${datasource.auth.username:root}
    password: ${datasource.auth.password:xiexie402}

management:
  metrics:
    tags:
      application: ${spring.application.name}
    export:
      prometheus:
        enabled: true

  #开启暴露web
  endpoints:
    web:
      exposure:
        include: prometheus


feign:
  client:
    config:
      default:
        connectTimeout: 50000
        readTimeout: 50000